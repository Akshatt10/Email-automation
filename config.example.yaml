profile:
  name: "Your Name"
  title: "Your Target Role (e.g. Backend Engineer)"
  years_of_experience: 2

  github: "https://github.com/yourusername"
  linkedin: "https://www.linkedin.com/in/yourprofile/"
  portfolio: "https://www.yourwebsite.com" 

  location: "Your City, Country"

  skills:
    - Python
    - Docker
    - APIs

  bio: >
    Write this not as a generic LinkedIn summary, but as a builder.
    Show that you don't wait for permission to figure things out. If something needs to exist,
    you build it, break it, fix it, and deploy it. Focus on what you've actually shipped.

  notable_projects:
    - name: "Your Best Project"
      description: >
        What the project did and what tech stack you used to build it.

  interests:
    - AI Infrastructure
    - Startups

  goals:
    short_term: "The exact type of role you are looking for."

  communication_style:
    tone: "direct, builder-mindset, zero fluff — like a founder pitching to an engineer"
    avoid: ["generic phrases", "buzzwords", "overly formal language", "begging for a chance", "I'm a quick learner"]
    emphasize: ["things shipped and deployed", "problems solved independently", "speed of execution"]
    # What to explicitly focus on vs avoid mentioning
    focus_areas: "backend systems engineering and data pipelines"
    highlight_project: "my AI Knowledge Vault (RAG System)"
    avoid_projects: "50 emails a day, n8n, frontend or minor basic projects"

  target_roles:
    - "Backend Engineer"
    - "AI/ML Engineer"

  avoid_companies:
    - "outsourcing companies"
    - "bond-based companies"
